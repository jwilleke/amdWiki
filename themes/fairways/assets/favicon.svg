<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a7a30"/>
      <stop offset="100%" stop-color="#2d5a27"/>
    </linearGradient>
    <linearGradient id="fairway" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a9e3c"/>
      <stop offset="100%" stop-color="#2d6a22"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" fill="url(#bg)" rx="5"/>
  <!-- Fairway stripe (lighter green band) -->
  <rect x="0" y="20" width="32" height="12" fill="url(#fairway)" rx="0"/>
  <rect x="0" y="27" width="32" height="5" fill="#1e4d18" rx="0"/>
  <!-- Flag pole -->
  <rect x="18" y="6" width="1.5" height="16" fill="#f0faec" opacity="0.9"/>
  <!-- Flag -->
  <polygon points="19.5,6 27,9.5 19.5,13" fill="#f0faec" opacity="0.95"/>
  <!-- Hole circle -->
  <ellipse cx="13" cy="22" rx="2.5" ry="1" fill="#1a3316" opacity="0.5"/>
</svg>
