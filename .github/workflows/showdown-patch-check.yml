name: Showdown CVE-2024-1899 Patch Check

on:
  schedule:
    # Every Tuesday at 09:23 UTC
    - cron: '23 9 * * 2'
  workflow_dispatch:

jobs:
  check:
    name: Check for showdown patch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Get installed and latest showdown versions
        id: versions
        run: |
          INSTALLED=$(node -e "console.log(require('./node_modules/showdown/package.json').version)")
          LATEST=$(npm view showdown version 2>/dev/null)
          echo "installed=$INSTALLED" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "Installed: $INSTALLED"
          echo "Latest:    $LATEST"

      - name: Check advisory for patched version
        id: advisory
        run: |
          PATCHED=$(curl -sf \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/advisories/GHSA-rmmh-p597-ppvv" \
            | jq -r '.vulnerabilities[]? | select(.package.name == "showdown") | .patched_versions // "none"' \
            2>/dev/null || echo "unknown")
          echo "patched=$PATCHED" >> $GITHUB_OUTPUT
          echo "Advisory patched_versions: $PATCHED"

      - name: Post issue comment if patch is available
        if: |
          steps.versions.outputs.latest != steps.versions.outputs.installed &&
          steps.advisory.outputs.patched != 'none' &&
          steps.advisory.outputs.patched != 'unknown'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment 599 --body "$(cat <<EOF
          ## Showdown patch available

          A new version of \`showdown\` has been published that may fix CVE-2024-1899.

          | | Version |
          |---|---|
          | **Installed** | ${{ steps.versions.outputs.installed }} |
          | **Latest** | ${{ steps.versions.outputs.latest }} |
          | **Advisory patched_versions** | ${{ steps.advisory.outputs.patched }} |

          **Action required:** Upgrade showdown and verify the CVE is resolved:
          \`\`\`bash
          npm install showdown@latest
          npm audit
          \`\`\`

          Then close this issue if \`npm audit\` no longer reports GHSA-rmmh-p597-ppvv.

          _Automated check by [showdown-patch-check.yml](.github/workflows/showdown-patch-check.yml)_
          EOF
          )"

      - name: Log no-patch status
        if: |
          steps.advisory.outputs.patched == 'none' ||
          steps.advisory.outputs.patched == 'unknown'
        run: |
          echo "No patch available yet. Installed: ${{ steps.versions.outputs.installed }}, Latest: ${{ steps.versions.outputs.latest }}, Advisory: ${{ steps.advisory.outputs.patched }}"
